name: ROCm 7.0.2 Build Test

on:
  #push:
  #  branches:
  #    - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-22.04:7.0.2
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix unfortunate rocm container bug
        run: |
          sed -i "s/7.0.2/30.10.2/" /etc/apt/sources.list.d/amdgpu.list 

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake build-essential git rocblas-dev hipblas-dev hipblaslt-dev
      
      - name: Configure CMake
        run: |
          cmake -S src -B build \
            -DWITH_ROCM=true \
            -DWITH_CUDA=false \
            -DGPU_TARGETS="gfx950,gfx1201,gfx1200,gfx1101,gfx1100,gfx1030,gfx942,gfx90a,gfx908"
      
      - name: Build
        run: cmake --build build
      
      - name: Build Summary
        if: always()
        run: |
          echo "ROCm 7.0.2 build complete: ${{ job.status }}"

